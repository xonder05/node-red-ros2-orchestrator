<script type="text/javascript">

    RED.nodes.registerType('manager-config', {
        category: "config",
        defaults: {
            manager_name: {value: ""},
            manager_id: {value: ""},
        },
        label: function () {
            return this.manager_name || "manager-config";
        },
    });
</script>

<script type="text/html" data-template-name="manager-config">
    
    <div class="form-row">
        <label for="node-config-input-manager_name">Name</label>
        <input type="text" id="node-config-input-manager_name">
    </div>

    <div class="form-row">
        <label for="node-config-input-manager_id">ID</label>
        <input type="text" id="node-config-input-manager_id">
    </div>

</script>
