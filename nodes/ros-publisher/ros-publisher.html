<script type="text/javascript">

    RED.nodes.registerType("ros-publisher",{
        category: "ROS2",
        color: "#C0DEED",
        defaults: {
            topic: {value:""},
            package: {value:""},
            interface: {value:""},
        },
        inputs: 1,
        outputs: 0,
        icon: "file.svg",
        label: function() {
            return this.name||"ros-publisher";
        },

        oneditprepare: async function () 
        {
            const node = this;

            const topic_autocomplete = $("#node-input-topic");
            const package_dropdown = $("#node-input-package");
            const interface_dropdown = $("#node-input-interface");

            node.topics_dictionary = {};

            async function get_topics_dictionary()
            {
                node.topics_dictionary = await $.getJSON("ros/local/get_topics");
            }

            topic_autocomplete.autoComplete(
            {
                search: function(user_input) 
                {
                    let matches = [];

                    for (topic of Object.keys(node.topics_dictionary))
                    {
                        if (topic.toLowerCase().indexOf(user_input.toLowerCase()) > -1)
                        {
                            matches.push({
                                value: topic,
                                label: topic,
                                i: i
                            })
                        }
                    }

                    matches.sort(function(A,B){return A.i-B.i})
                    
                    return matches
                },
            });

            topic_autocomplete.on("change", async function() 
            {
                if (this.value in node.topics_dictionary)
                {
                    const full_type_name = node.topics_dictionary[this.value]
                    const [package_name, msg, type_name] = full_type_name.split("/")
                    
                    package_dropdown.val(package_name);
                    await populate_interface_dropdown();
                    interface_dropdown.val(type_name);
                }
            })

            async function populate_package_dropdown() 
            {
                package_dropdown.empty()

                const selected_package = node.package;

                const packages_list = await $.getJSON("ros/local/list_packages");
                
                for (const package of packages_list)
                {
                    const selected = (package === selected_package) ? "selected" : "";
                    package_dropdown.append(`<option value="${package}" ${selected}>${package}</option>`);
                }
            }

            async function populate_interface_dropdown() 
            {
                const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package;

                interface_dropdown.empty();

                const selected_interface = node.interface;

                const interfaces_list = await $.getJSON("ros/local/list_interfaces",
                {
                    package: selected_package,
                });

                for (const interface of interfaces_list)
                {
                    const selected = (interface === selected_interface) ? "selected" : "";
                    interface_dropdown.append(`<option value="${interface}" ${selected}>${interface}</option>`);
                }
            }

            await get_topics_dictionary();
            await populate_package_dropdown();
            await populate_interface_dropdown();

            package_dropdown.on("change", populate_interface_dropdown);
        }

    });

</script>

<script type="text/html" data-template-name="ros-publisher">
    
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-tag"></i> Topic</label>
        <input id="node-input-topic" type="text" placeholder="topic"></select>
    </div>

    <div class="form-row">
        <label for="node-input-package"><i class="fa fa-folder"></i> Package</label>
        <select id="node-input-package" placeholder="package"></select>
    </div>

    <div class="form-row">
        <label for="node-input-interface"><i class="fa fa-cubes"></i> Type</label>
        <select id="node-input-interface" placeholder="type"></select>
    </div>

</script>

<script type="text/html" data-help-name="ros-publisher">
    <p>Node description</p>
</script>
