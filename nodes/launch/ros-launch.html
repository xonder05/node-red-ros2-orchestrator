<script> /**
 * @file ros-launch.html
 * @author Daniel Onderka (xonder05)
 * @date 10/2025
 */ </script>

<script type="text/javascript">

    RED.nodes.registerType("ros-launch", 
    {
        category: "ROS2",
        color: "#E2D96E",
        defaults: {
            manager: {value: "", type: "manager-config"},
            package_name: {value: ""},
            launch_name: {value: ""},
            config_name: {value: ""},
            args: {value: {}},
        },
        inputs: 1,
        outputs: 2,
        icon: "file.png",
        label: function () {
            return this.launch_name || "ros-launch";
        },

        /**
         * Edit preparing is separated into helper function.
         * One per edit field. All of the helpers follow the same structure.
         * If they use some more complicated field they start by initializing it (tabs, editableList, editor). 
         * Than a try catch block follows. In the try part, backend call is done, data are fetched and loaded into the field.
         * If the call fails (usually because ros2_interface is offline), catch disables the field
         * and if there is already saved value for the field than it is inserted.
         */
        oneditprepare: async function () 
        {
            const node = this;

            const interface_offline_alert = $("#interface-offline-alert");
            const manager_dropdown = $("#node-input-manager");
            const package_dropdown = $("#node-input-package_name");
            const launch_file_dropdown = $("#node-input-launch_name");
            const config_file_dropdown = $("#node-input-config_name");
            const args_editable_list = $("#node-input-args_container");
            const save_launch_btn = $("#save_launch_btn");
            const save_config_btn = $("#save_config_btn");
            const save_success_alert = $("#save-success-alert");
            const save_failed_alert = $("#save-failed-alert");

            function build_tabs()
            {
                node.tabs = RED.tabs.create(
                {
                    id: "tabs-header",
                    scrollable: false,
                    collapsible: false,

                    onchange: function(tab) 
                    {
                        $("#tabs-content").children().hide()
                        $(`#${tab.id}`).show()
                    },
                })

                node.tabs.addTab({ id: "settings_tab", label: "Setting" })
                node.tabs.addTab({ id: "launch_tab",  label: "Launch Editor" })
                node.tabs.addTab({ id: "config_tab",  label: "Config Editor" })

                $("#tabs-content").children().hide()
                $("#settings_tab").show()
            }

            async function populate_package_dropdown()
            {
                try
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = node.package_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const packages_list = await $.getJSON("ros/manager/list_packages",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                    });

                    package_dropdown.empty();

                    for (const package of packages_list)
                    {
                        const selected = (package === selected_package) ? "selected" : "";
                        package_dropdown.append(`<option value="${package}" ${selected}>${package}</option>`);
                    }

                    if (package_dropdown.val()) {
                        package_dropdown.trigger("change");
                    }
                }
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        package_dropdown.prop("disabled", true);
                        package_dropdown.append(`<option value="${node.package_name}" selected>${node.package_name}</option>`);
                    }
                }
            }

            async function populate_launch_file_dropdown()
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_launch = node.launch_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const launch_file_list = await $.getJSON("ros/manager/list_launch_files",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                    });

                    launch_file_dropdown.empty();

                    for (const launch_file of launch_file_list)
                    {
                        const selected = (launch_file === selected_launch) ? "selected" : "";
                        launch_file_dropdown.append(`<option value="${launch_file}" ${selected}>${launch_file}</option>`);
                    }

                    if (launch_file_dropdown.val()) {
                        launch_file_dropdown.trigger("change");
                    }
                }
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        launch_file_dropdown.prop("disabled", true);
                        launch_file_dropdown.append(`<option value="${node.launch_name}" selected>${node.launch_name}</option>`);
                    }
                }
            }

            async function populate_config_file_dropdown()
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_config = node.config_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const config_file_list = await $.getJSON("ros/manager/list_config_files",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                    });

                    config_file_dropdown.empty();

                    for (const config_file of config_file_list)
                    {
                        const selected = (config_file === selected_config) ? "selected" : "";
                        config_file_dropdown.append(`<option value="${config_file}" ${selected}>${config_file}</option>`);
                    }

                    if (config_file_dropdown.val()) {
                        config_file_dropdown.trigger("change");
                    }
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        config_file_dropdown.prop("disabled", true);
                        config_file_dropdown.append(`<option value="${node.config_name}" selected>${node.config_name}</option>`);
                    }
                }
            }

            async function populate_arguments_editable_list()
            {
                args_editable_list.editableList(
                {
                    addItem: function(container, i, opt)
                    {
                        const arg = opt || {name: "", value: ""};

                        const row = $("<div/>", {
                            class: "editable_list_row"
                        }).appendTo(container);

                        const key_input = $("<input/>", {
                            type: "text",
                            class: "node-input-arg-name",
                            placeholder: "argument"
                        }).appendTo(row).val(arg.name);

                        const value_input = $("<input/>", {
                            type: "text",
                            class: "node-input-arg-value",
                            placeholder: "value"
                        }).appendTo(row).val(arg.value);
                    },

                    removable: true,
                });

                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_launch_file_name = launch_file_dropdown.val() ? launch_file_dropdown.val() : node.launch_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const arguments_dict = await $.getJSON("ros/manager/list_launch_arguments",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                        launch_file_name: selected_launch_file_name,
                    });

                    args_editable_list.editableList("empty");

                    for(const [arg, def] of Object.entries(arguments_dict))
                    {
                        const value = node.args[arg];

                        if (value) {
                            args_editable_list.editableList("addItem", {name: arg, value: value});
                        }
                        else {
                            args_editable_list.editableList("addItem", {name: arg, value: def});
                        }
                    }
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        args_editable_list.parent().parent().find(".red-ui-editableList-addButton").prop("disabled", true);
                    }
                }
            }

            async function populate_launch_file_contents()
            {
                if (!node.launch_editor)
                {
                    node.launch_editor = RED.editor.createEditor({
                        id: "node-input-launch_content",
                        mode: "ace/mode/python",
                    });
                }

                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_launch_file_name = launch_file_dropdown.val() ? launch_file_dropdown.val() : node.launch_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const file_content = await $.getJSON("ros/manager/read_file",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                        file_name: selected_launch_file_name,
                    });

                    node.launch_editor.setValue(file_content, -1);
                }
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        save_launch_btn.prop("disabled", true);
                        node.launch_editor.setReadOnly(true);
                    }
                }
            }

            async function populate_config_file_contents()
            {
                if (!node.config_editor)
                {
                    node.config_editor = RED.editor.createEditor({
                        id: "node-input-config_content",
                        mode: "ace/mode/yaml",
                    });
                }

                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_config_file_name = config_file_dropdown.val() ? config_file_dropdown.val() : node.config_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const file_content = await $.getJSON("ros/manager/read_file",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                        file_name: selected_config_file_name,
                    });

                    node.config_editor.setValue(file_content, -1);
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        save_config_btn.prop("disabled", true);
                        node.config_editor.setReadOnly(true);
                    }
                }
            }

            async function write_back_launch_file_content()
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_launch_file_name = launch_file_dropdown.val() ? launch_file_dropdown.val() : node.launch_name;
                    const launch_content = node.launch_editor.getValue();

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    return_value = await $.getJSON("ros/manager/write_file",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                        file_name: selected_launch_file_name,
                        file_content: launch_content,
                    });

                    if (return_value == "4")
                    {
                        save_success_alert.addClass("open");
                        setTimeout(() => {
                            save_success_alert.removeClass("open");
                        }, 2000);
                    }
                    else
                    {
                        save_success_alert.addClass("open");
                        setTimeout(() => {
                            save_success_alert.removeClass("open");
                        }, 2000);
                    }
                }
                catch (error) 
                {

                }
            }

            async function write_back_config_file_content()
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_config_file_name = config_file_dropdown.val() ? config_file_dropdown.val() : node.config_name;
                    const config_content = node.config_editor.getValue();

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    return_value = await $.getJSON("ros/manager/write_file",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                        file_name: selected_config_file_name,
                        file_content: config_content,
                    });

                    if (return_value == "4")
                    {
                        save_success_alert.addClass("open");
                        setTimeout(() => {
                            save_success_alert.removeClass("open");
                        }, 2000);
                    }
                    else
                    {
                        save_success_alert.addClass("open");
                        setTimeout(() => {
                            save_success_alert.removeClass("open");
                        }, 2000);
                    }
                } 
                catch (error) 
                {

                }
            }

            build_tabs();
            await populate_package_dropdown();
            await populate_launch_file_dropdown();
            await populate_config_file_dropdown();
            await populate_arguments_editable_list();
            await populate_launch_file_contents();
            await populate_config_file_contents();

            manager_dropdown.on("change", populate_package_dropdown);
            package_dropdown.on("change", populate_launch_file_dropdown);
            package_dropdown.on("change", populate_config_file_dropdown);
            launch_file_dropdown.on("change", populate_arguments_editable_list);
            launch_file_dropdown.on("change", populate_launch_file_contents);
            config_file_dropdown.on("change", populate_config_file_contents);
            save_launch_btn.on("click", write_back_launch_file_content)
            save_config_btn.on("click", write_back_config_file_content)
        },

        /**
         * This function is used primarily because widgets (editableList, editor) need to manually extract and save values
         */
        oneditsave: async function()
        {
            const node = this;

            const package_dropdown = $("#node-input-package");
            const launch_file_dropdown = $("#node-input-launch_name");
            const config_file_dropdown = $("#node-input-config_name");
            const args_editable_list = $("#node-input-args_container");

            function save_args()
            {
                const args = args_editable_list.editableList("items");
                node.args = {};

                for (row of args)
                {
                    const name = row.find(".node-input-arg-name").val();
                    const value = row.find(".node-input-arg-value").val();

                    if (name) {
                        node.args[name] = value;
                    }
                }
            }

            function destroy_launch_editor()
            {
                node.launch_editor.destroy();
                delete node.launch_editor;
            }

            function destroy_config_editor()
            {
                node.config_editor.destroy();
                delete node.config_editor;
            }

            save_args();
            destroy_launch_editor();
            destroy_config_editor();
        },

        oneditcancel: function() 
        {
            const node = this;

            function destroy_launch_editor()
            {
                node.launch_editor.destroy();
                delete node.launch_editor;
            }

            function destroy_config_editor()
            {
                node.config_editor.destroy();
                delete node.config_editor;
            }

            destroy_launch_editor();
            destroy_config_editor();
        },
    });

</script>

<script type="text/html" data-template-name="ros-launch">

    <style>
        .edit-dialog-alert {
            display: flex;
            flex-direction: row; 
            justify-content: center; 
            border: solid 1px tomato; 
            border-radius: 5px; 
            padding: 5px;

            max-height: 20px;
            transition-duration: 0.5s;
        }

        .edit-dialog-alert:not(.open) {
            overflow: hidden;
            max-height: 0;
            padding: 0;
            border-width: 0;
            margin: 0;

            transition-duration: 0.5s;
        }

        .edit-dialog-alert i {
            font-size: large;
            color: tomato;
            margin-right: 10px;
        }

        .edit-dialog-alert span {
            font-size: large; 
            font-weight: bold;
        }

        .editable_list_row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #node-input-arg-name {
            flex: 1;
        }

        #node-input-arg-value {
            flex: 1;
        }

    </style>

    <div id="interface-offline-alert" class="form-row edit-dialog-alert">
        <i class="fa fa-fw fa-plug"></i>
        <span>ROS2 Interface is offline</span>
    </div>

    <div id="save-success-alert" class="form-row edit-dialog-alert">
        <i class="fa fa-fw fa-check"></i>
        <span>File successfully saved</span>
    </div>

    <div id="save-failed-alert" class="form-row edit-dialog-alert">
        <i class="fa fa-fw fa-times"></i>
        <span>Failed to save file</span>
    </div>

    <div class="form-row">
        <ul id="tabs-header"></ul>
    </div>

    <div id="tabs-content">

        <div id="settings_tab">

            <div class="form-row">
                <label for="node-input-manager"><i class="fa fa-fw fa-server"></i> Manager</label>
                <input id="node-input-manager" type="text">
            </div>

            <div class="form-row">
                <label for="node-input-package_name"><i class="fa fa-fw fa-cubes"></i> Package</label>
                <select id="node-input-package_name" style="width: 70%;"></select>
            </div>

            <div class="form-row">
                <label for="node-input-launch_name"><i class="fa fa-fw fa-rocket"></i> Launch</label>
                <select id="node-input-launch_name" style="width: 70%;"></select>
            </div>

            <div class="form-row">
                <label for="node-input-config_name"><i class="fa fa-fw fa-sliders"></i> Config</label>
                <select id="node-input-config_name" style="width: 70%;"></select>
            </div>

            <div class="form-row">
                <label for="node-input-args_container" style="vertical-align: top;"><i class="fa fa-fw fa-cogs"></i> Arguments</label>
                <div style="display: inline-block; width: 70%;">
                    <ol id="node-input-args_container"></ol>
                </div>
            </div>

        </div>

        <div id="launch_tab">

            <div class="form-row">
                <button id="save_launch_btn" class="red-ui-button">Save Changes</button>
            </div>

            <div class="form-row">
                <div id="node-input-launch_content" class="node-text-editor" style="height: 70vh;"></div>
            </div>
        
        </div>

        <div id="config_tab">

            <div class="form-row">
                <button id="save_config_btn" class="red-ui-button">Save Changes</button>
            </div>

            <div class="form-row">
                <div id="node-input-config_content" class="node-text-editor" style="height: 70vh;"></div>
            </div>

        </div>

    </div>

</script>

<script type="text/markdown" data-help-name="ros-launch">

Allows you to edit and orchestrate ROS2 launch and config files.

### Inputs

: payload (string) : "start" or "stop" command

### Outputs

1. State
: payload (string) : serialized version of the state shown by Editor

2. Terminal output
: payload (string) : combined stdout and stderr output of the running launch file

### Details

The goal of this node is to bring functionality of the ROS2 launch system into Node-RED.
That is accomplished by allowing you to edit both launch and configuration files directly from 
Node-RED. Orchestration part is handled after deployment by sending commands to this node's input 
and getting state and log from its outputs. 

#### Edit dialog

Most of the properties in edit dialog require ROS2 Interface to be running, for more information 
see ros2-interface node.

- Manager - This is a configuration node selector, for more information see manager-config node.
- Package - This dropdown is automatically filled with all packages that are installed on the device where previously selected Manager is running.
- Launch - This dropdown is automatically filled with all launch files that are installed as part of the previously selected package.
- Config - This dropdown is automatically filled with all config files that are installed as part of the previously selected package.
- Arguments - This key value list is automatically filled with arguments defined by previously selected launch file.

#### Editing

Launch and Config Editor tabs allow you to edit ROS2 launch and config files directly from Node-RED.
To prevent unintended changes to the files, using the Done button does not automatically save anything 
and therefore upon exiting the dialog all changes are lost.
If you want to save them, you must use the dedicated Save Changes button beforehand.

#### Runtime

Runtime part is pretty well explained by inputs and outputs sections.

</script>
