<script> /**
 * @file ros-launch.html
 * @author Daniel Onderka (xonder05)
 * @date 10/2025
 */ </script>

<script type="text/javascript" src="resources/node-red-custom-nodes/log.js"></script>

<script type="text/javascript">

    RED.nodes.registerType("ros-launch", {
        category: "ROS2",
        color: "#E2D96E",
        defaults: {
            manager: {value: "", type: "manager-config"},
            package: {value: ""},
            launch_name: {value: ""},
            launch_args: {value: {}},
            launch_content: {value: ""},
        },
        inputs: 1,
        outputs: 2,
        icon: "file.png",
        label: function () {
            return this.launch_name || "ros-launch";
        },

        oneditprepare: async function () 
        {
            const node = this;

            const active_div = $("#active");
            const inactive_div = $("#inactive");

            const package_dropdown = $("#node-input-package");
            const launch_file_dropdown = $("#node-input-launch_name");
            const launch_file_content_dropdown = $("#node-input-launch_content");

            async function populate_package_dropdown()
            {
                // clear whatever used to be there
                package_dropdown.empty();

                // previously selected value
                const selected_package = node.package;

                let packages_list = [];
                try 
                {
                    // list of available packages
                    packages_list = await $.getJSON("ros/manager/list_packages",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                    });
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        active_div.hide();
                        inactive_div.show();
                    }
                }

                for (const package of packages_list)
                {
                    const selected = (package === selected_package) ? "selected" : "";
                    package_dropdown.append(`<option value="${package}" ${selected}>${package}</option>`);
                }
            }

            async function populate_launch_file_dropdown()
            {
                const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package;

                launch_file_dropdown.empty();

                const selected_launch = node.launch_name;

                let launch_file_list = [];
                try 
                {
                    launch_file_list = await $.getJSON("ros/manager/list_launch_files",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                        package: selected_package,
                    });
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        active_div.hide();
                        inactive_div.show();
                    }
                }

                for (const launch_file of launch_file_list)
                {
                    const selected = (launch_file === selected_launch) ? "selected" : "";
                    launch_file_dropdown.append(`<option value="${launch_file}" ${selected}>${launch_file}</option>`);
                }
            }

            $('#node-input-args_container').css('min-height','120px').css('min-width','450px').editableList(
            {
                addItem: function(container, i, opt)
                {
                    const arg = opt || {name: "", value: ""};

                    const row = $('<div/>')
                        .css({display: "flex", gap: "6px", alignItems: "center"})
                        .appendTo(container);

                    const key_input = $("<input/>", {
                        type: "text",
                        class: "node-input-arg-name",
                        placeholder: "key"
                    }).css({flex: "1"}).appendTo(row).val(arg.name);

                    const value_input = $("<input/>", {
                        type: "text",
                        class: "node-input-arg-value",
                        placeholder: "val"
                    }).css({flex: "1"}).appendTo(row).val(arg.value);
                    
                },
                removable: true,
            });

            async function populate_arguments_editable_list()
            {
                const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package;
                const selected_launch_file_name = launch_file_dropdown.val() ? launch_file_dropdown.val() : node.launch_name;

                let launch_file_path = "";
                let arguments_dict = {};
                try 
                {
                    launch_file_path = await $.getJSON("ros/manager/get_full_launch_path",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                        package_name: selected_package,
                        launch_file_name: selected_launch_file_name,
                    });

                    arguments_dict = await $.getJSON("ros/manager/get_launch_arguments",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                        launch_file_path: launch_file_path,
                    });
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        active_div.hide();
                        inactive_div.show();
                    }
                }

                $("#node-input-args_container").editableList('empty');
                for(const [arg, def] of Object.entries(arguments_dict))
                {
                    const value = node.launch_args[arg];

                    if (value) {
                        $("#node-input-args_container").editableList('addItem', {name: arg, value: value});
                    }
                    else {
                        $("#node-input-args_container").editableList('addItem', {name: arg, value: def});
                    }
                }
            }

            async function populate_launch_file_contents()
            {
                const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package;
                const selected_launch_file_name = launch_file_dropdown.val() ? launch_file_dropdown.val() : node.launch_name;

                let launch_file_path;
                let launch_file_content;
                try 
                {
                    launch_file_path = await $.getJSON("ros/manager/get_full_launch_path",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                        package_name: selected_package,
                        launch_file_name: selected_launch_file_name,
                    });

                    launch_file_content = await $.getJSON("/ros/manager/get_file_content",
                    {
                        manager_id: RED.nodes.node(node.manager).manager_id,
                        launch_file_path: launch_file_path,
                    });
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        active_div.hide();
                        inactive_div.show();
                    }
                }

                node.editor = RED.editor.createEditor({
                    id: "node-input-launch_content",
                    mode: "python",
                    value: launch_file_content
                });
            }

            active_div.show();
            inactive_div.hide();

            await populate_package_dropdown();
            await populate_launch_file_dropdown();
            await populate_arguments_editable_list();
            await populate_launch_file_contents();

            package_dropdown.on("change", populate_launch_file_dropdown);
            launch_file_dropdown.on("change", populate_arguments_editable_list);
            launch_file_dropdown.on("change", populate_launch_file_contents);
        },

        oneditsave: function()
        {
            const node = this;

            const args = $("#node-input-args_container").editableList('items');
            node.launch_args = {};

            for (row of args)
            {
                const name = row.find('.node-input-arg-name').val();
                const value = row.find('.node-input-arg-value').val();

                if (name) {
                    node.launch_args[name] = value;
                }
            }

            node.launch_content = node.editor.getValue();
            node.editor.destroy();
            delete node.editor;
        },

        oneditcancel: function() 
        {
            const node = this;

            node.editor.destroy();
            delete node.editor;
        },

    });

</script>

<script type="text/html" data-template-name="ros-launch">
    
    <div id="inactive" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #555;">
        <i class="fa fa-plug" style="font-size: 80px; margin-bottom: 20px; color: #e74c3c;"></i>
        <div style="font-size: 24px; font-weight: bold;">ROS2 interface is offline</div>
    </div>

    <div id="active">

        <div class="form-row">
            <label for="node-input-manager"><i class="fa fa-server"></i> Manager</label>
            <input type="text" id="node-input-manager">
        </div>

        <div class="form-row">
            <label for="node-input-package"><i class="fa fa-folder"></i> Package</label>
            <select id="node-input-package" placeholder="Package"></select>
        </div>

        <div class="form-row">
            <label for="node-input-launch_name"><i class="fa fa-file"></i> Launch</label>
            <select id="node-input-launch_name" placeholder="Launch"></select>
        </div>

        <div class="form-row">
            <label for="node-input-args_container"><i class="fa fa-list"></i> Arguments</label>
            <ol id="node-input-args_container"></ol>
        </div>

        <div class="form-row">
            <label for="node-input-launch_content"><i class="fa fa-bars"></i> File</label>
            <div class="node-text-editor" style="height: 40vh; min-height:10vh;" id="node-input-launch_content"></div>
        </div>
    
    </div>

</script>

<script type="text/html" data-help-name="ros-launch">
    <p>Node description</p>
</script>
