<script type="text/javascript">
    
    RED.nodes.registerType("ros-node",{
        category: "ROS2",
        color: "#F3B567",
        defaults: {
            manager: {value: "", type: "manager-config"},
            package_name: {value: ""},
            node_name: {value: ""},
            runtime_node_name: {value: ""},
            namespace: {value: ""},
            params: {value: {}},
            remaps: {value: {}},
        },
        inputs: 1,
        outputs: 2,
        icon: "file.svg",
        label: function() {
            return this.node_name || "ros-node";
        },

        oneditprepare: async function () 
        {
            const node = this;

            const interface_offline_alert = $("#interface-offline-alert");
            const manager_dropdown = $("#node-input-manager");
            const package_dropdown = $("#node-input-package_name");
            const node_dropdown = $("#node-input-node_name");
            const params_editable_list = $("#node-input-params_container");
            const remaps_editable_list = $("#node-input-remaps_container");

            async function populate_package_dropdown() 
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = node.package_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const packages_list = await $.getJSON("/ros/manager/list_packages",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id
                    });

                    package_dropdown.empty();

                    for (const package of packages_list)
                    {
                        const selected = (package === selected_package) ? "selected" : "";
                        package_dropdown.append(`<option value="${package}" ${selected}>${package}</option>`);
                    }

                    if (package_dropdown.val()) {
                        package_dropdown.trigger("change");
                    }
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        package_dropdown.prop("disabled", true);
                        package_dropdown.append(`<option value="${node.package_name}" selected>${node.package_name}</option>`);
                    }
                }
            }

            async function populate_node_dropdown(params) 
            {
                try 
                {
                    const selected_manager = manager_dropdown.val() ? manager_dropdown.val() : node.manager;
                    const selected_package = package_dropdown.val() ? package_dropdown.val() : node.package_name;
                    const selected_node = node.node_name;

                    if (selected_manager == "" || selected_manager == "_ADD_") return;

                    const node_list = await $.getJSON("ros/manager/list_nodes",
                    {
                        manager_id: RED.nodes.node(selected_manager).manager_id,
                        package_name: selected_package,
                    });

                    node_dropdown.empty();

                    for (const node of node_list) 
                    {
                        const selected = (node === selected_node) ? "selected" : "";
                        node_dropdown.append(`<option value="${node}" ${selected}>${node}</option>`);
                    } 
                } 
                catch (error) 
                {
                    if (error.responseJSON.state == "inactive") {
                        interface_offline_alert.addClass("open");

                        node_dropdown.prop("disabled", true);
                        node_dropdown.append(`<option value="${node.node_name}" selected>${node.node_name}</option>`);
                    }
                }
            }

            async function populate_params_editable_list()
            {
                params_editable_list.editableList(
                {
                    addItem: function(container, i, opt)
                    {
                        const param = opt || {name: "", value: ""};

                        const row = $("<div/>", {
                            class: "editable_list_row"
                        }).appendTo(container);

                        const key_input = $("<input/>", {
                            type: "text",
                            class: "node-input-param-name",
                            placeholder: "parameter"
                        }).appendTo(row).val(param.name);

                        const value_input = $("<input/>", {
                            type: "text",
                            class: "node-input-param-value",
                            placeholder: "value"
                        }).appendTo(row).val(param.value);
                        
                    },

                    removable: true,
                });

                for(const [name, value] of Object.entries(node.params))
                {
                    params_editable_list.editableList("addItem", {name: name, value: value});
                }
            }

            async function populate_remaps_editable_list()
            {
                remaps_editable_list.editableList(
                {
                    addItem: function(container, i, opt)
                    {
                        const remap = opt || {t1: "", t2: ""};

                        const row = $("<div/>", {
                            class: "editable_list_row"
                        }).appendTo(container);

                        const key_input = $("<input/>", {
                            type: "text",
                            class: "node-input-remap-t1",
                            placeholder: "original"
                        }).appendTo(row).val(remap.t1);

                        const value_input = $("<input/>", {
                            type: "text",
                            class: "node-input-remap-t2",
                            placeholder: "remapped"
                        }).appendTo(row).val(remap.t2);
                        
                    },

                    removable: true,
                });

                for(const [t1, t2] of Object.entries(node.remaps))
                {
                    remaps_editable_list.editableList("addItem", {t1: t1, t2: t2});
                }  
            }

            await populate_package_dropdown();
            await populate_node_dropdown();
            await populate_params_editable_list();
            await populate_remaps_editable_list();

            manager_dropdown.on("change", populate_package_dropdown);
            package_dropdown.on("change", populate_node_dropdown);
        },

        oneditsave: function()
        {
            const node = this;

            const params_editable_list = $("#node-input-params_container");
            const remaps_editable_list = $("#node-input-remaps_container");

            function save_params()
            {
                const params = params_editable_list.editableList("items");
                node.params = {};

                for (row of params)
                {
                    const name = row.find(".node-input-param-name").val();
                    const value = row.find(".node-input-param-value").val();

                    if (name) {
                        node.params[name] = value;
                    }
                }
            }

            function save_remaps()
            {
                const remaps = remaps_editable_list.editableList("items");
                node.remaps = {};

                for (row of remaps)
                {
                    const t1 = row.find(".node-input-remap-t1").val();
                    const t2 = row.find(".node-input-remap-t2").val();

                    if (t1) {
                        node.remaps[t1] = t2;
                    }
                }
            }

            save_params();
            save_remaps();
        },

    });

</script>

    <div class="form-row">
        <label for="node-input-remaps_container" style="vertical-align: top;"><i class="fa fa-fw fa-random"></i> Remaps</label>
        <div style="display: inline-block; width: 70%;">
            <ol id="node-input-remaps_container"></ol>
        </div>

</script>

<script type="text/markdown" data-help-name="ros-node">

Allows you to edit configuration and orchestrate runtime of ROS2 nodes.

### Inputs

: payload (string) : "start" or "stop" command

### Outputs

1. State
: payload (string) : serialized version of the state shown by Editor

2. Terminal output
: payload (string) : combined stdout and stderr output of the running ROS2 node

### Details

The goal of this node is to let Node-RED control ROS2 nodes.
This node provides most of the functionality of the *ros2 run* command.
That means setting node name, namespace, parameters and remaps. 
Using this node is ideal if you want to handle most of the orchestration in Node-RED, or if you are looking for quick prototyping. 
If you want something more powerful and possibly usable even without Node-RED see ros-launch node.

#### Edit dialog

Most of the properties in edit dialog require ROS2 Interface to be running, for more information 
see ros2-interface node.

- Manager - This is a configuration node selector, for more information see manager-config node.
- Package - This dropdown is automatically filled with all packages that are installed on the device where previously selected Manager is running.
- Node - This dropdown is automatically filled with all nodes that are installed as part of the previously selected package.

- Name - Runtime name, for cases when it needs to be different from executable name.
- Namespace - Namespace in which the node will be run.
- Parameters - Simple key value list for setting parameters (param value).
- Remaps - Simple key value list for setting remaps (original new).

#### Runtime

Runtime part is pretty well explained by inputs and outputs sections.

</script>
